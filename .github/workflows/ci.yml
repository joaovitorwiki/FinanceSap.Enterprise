name: FinanceSap CI

# ─────────────────────────────────────────────────────────────────────────────
# Dispara em push ou pull_request para main/master.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancela runs anteriores do mesmo PR para economizar minutos do GitHub Actions.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build + Unit Tests (sem banco de dados)
  # Roda sempre. Rápido. Valida compilação e testes unitários (CpfTests, etc.)
  # ───────────────────────────────────────────────────────────────────────────
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Cache de pacotes NuGet — evita re-download a cada run.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore FinanceSap.Enterprise.sln

      - name: Build (Release)
        run: dotnet build FinanceSap.Enterprise.sln --configuration Release --no-restore

      # Roda APENAS os testes unitários (ValueObjects/) — sem banco.
      # O filtro ~Category=Integration exclui testes que precisam do MySQL.
      - name: Run unit tests
        run: |
          dotnet test FinanceSap.Tests/FinanceSap.Tests.csproj \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~ValueObjects" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      # Publica o relatório de cobertura como artefato para download.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Integration Tests (com MySQL Service Container)
  #
  # ATENÇÃO: Este job sobe um container MySQL real no runner do GitHub Actions.
  # Ele espelha exatamente o que o CustomWebApplicationFactory faz localmente.
  #
  # Se você NÃO quiser rodar testes de integração no CI agora, comente o job
  # inteiro ou adicione: if: false
  # ───────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (MySQL)
    runs-on: ubuntu-latest
    needs: build-and-unit-tests

    # ── MySQL Service Container ──────────────────────────────────────────────
    # Sintaxe de array no health-cmd — evita problema de escape de aspas no YAML.
    # O runner acessa o MySQL via 127.0.0.1 (localhost não resolve para containers).
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: financesap_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore FinanceSap.Enterprise.sln

      # Build obrigatório neste job — cada job é uma VM nova e não herda
      # binários do job anterior. --no-build causava FileNotFoundException.
      - name: Build (Release)
        run: dotnet build FinanceSap.Enterprise.sln --configuration Release --no-restore

      # Garante que o MySQL aceitou conexões antes de iniciar os testes.
      # O health check do service container valida o processo, mas não garante
      # que o usuário root já está pronto para aceitar conexões externas.
      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 15); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL ready after $i attempts."
              exit 0
            fi
            echo "Attempt $i/15 — waiting 2s..."
            sleep 2
          done
          echo "MySQL did not become ready in time." && exit 1

      - name: Run integration tests
        env:
          # 127.0.0.1 obrigatório — 'localhost' tenta socket Unix, não TCP,
          # e falha dentro do runner do GitHub Actions.
          TEST_DB_CONNECTION: "Server=127.0.0.1;Port=3306;Database=financesap_tests;Uid=root;Pwd=root;"

          # Os nomes abaixo usam double underscore (__) — notação do .NET para
          # hierarquia de configuração via variável de ambiente.
          # Isso mapeia para: { "Jwt": { "Key": "..." } } no appsettings.
          #
          # ── AÇÃO NECESSÁRIA ─────────────────────────────────────────────────
          # Confirme que seus GitHub Secrets têm EXATAMENTE estes nomes:
          #   JWT_KEY      → valor: chave secreta com mínimo 32 caracteres
          #   JWT_ISSUER   → valor: FinanceSap
          #   JWT_AUDIENCE → valor: FinanceSap
          # GitHub: Settings → Secrets and variables → Actions → New repository secret
          # ────────────────────────────────────────────────────────────────────
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}

        run: |
          dotnet test FinanceSap.Tests/FinanceSap.Tests.csproj \
            --configuration Release \
            --filter "FullyQualifiedName~Integration" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./test-results
          retention-days: 7
