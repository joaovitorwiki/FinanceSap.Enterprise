name: FinanceSap CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Enterprise-grade CI/CD pipeline with strict environment parity and observability.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── GitHub Actions Permissions (Principle of Least Privilege) ────────────────
# Concede apenas as permissões mínimas necessárias para o workflow funcionar.
# Ref: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  contents: read        # Ler código do repositório
  checks: write         # Criar check runs (test-reporter)
  pull-requests: write  # Comentar em PRs com resultados de testes
  actions: read         # Ler metadados de workflows

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_PATH: 'FinanceSap.Enterprise.sln'
  TEST_PROJECT: 'FinanceSap.Tests/FinanceSap.Tests.csproj'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — Build & Unit Tests (Fast Feedback Loop)
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-unit-tests:
    name: 🔨 Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better blame/analysis

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔄 Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🏗️ Build solution (Release)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=true \
            /p:WarningLevel=4

      - name: 🧪 Run unit tests
        run: |
          dotnet test ${{ env.TEST_PROJECT }} \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~ValueObjects" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --logger "html;LogFileName=unit-tests.html" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results/unit

      # ── Test Results Summary (Native GitHub Actions) ──────────────────────────
      - name: 📊 Generate unit test summary
        if: always()
        run: |
          echo "## 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "./test-results/unit/unit-tests.trx" ]; then
            TOTAL=$(grep -oP 'total="\K[0-9]+' ./test-results/unit/unit-tests.trx | head -1)
            PASSED=$(grep -oP 'passed="\K[0-9]+' ./test-results/unit/unit-tests.trx | head -1)
            FAILED=$(grep -oP 'failed="\K[0-9]+' ./test-results/unit/unit-tests.trx | head -1)
            
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILED" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ❌ Test Failures" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -A 10 'outcome="Failed"' ./test-results/unit/unit-tests.trx | head -100 >> $GITHUB_STEP_SUMMARY || echo "No detailed failure info"
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: ./test-results/unit
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — Integration Tests (Production-Grade Environment Parity)
  # ═══════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: 🧬 Integration Tests (MySQL)
    runs-on: ubuntu-latest
    needs: build-and-unit-tests
    timeout-minutes: 15

    # ── Service Container: MySQL 8.0 with Native Docker Healthcheck ──────────
    # The healthcheck MUST pass before any step runs — strict dependency.
    # Uses mysqladmin ping with proper authentication and silent mode.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: financesap_tests
          # Performance tuning for CI — faster startup
          MYSQL_INITDB_SKIP_TZINFO: 1
        ports:
          - 3306:3306
        # Native Docker healthcheck — GitHub Actions waits for 'healthy' status
        options: >-
          --name mysql-test-container
          --health-cmd="mysqladmin ping --silent -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
          --health-start-period=30s

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔄 Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🏗️ Build solution (Release)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --configuration Release \
            --no-restore

      # ── Explicit MySQL Readiness Verification ─────────────────────────────
      # Double-checks that MySQL accepts TCP connections on 127.0.0.1:3306
      # before running tests. Prevents race conditions.
      - name: 🔍 Verify MySQL readiness
        run: |
          echo "Waiting for MySQL to accept connections..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "✅ MySQL is ready (attempt $i/30)"
              mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
              exit 0
            fi
            echo "⏳ Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "❌ MySQL failed to become ready in 60 seconds"
          exit 1

      # ── Integration Tests with Full Environment Parity ────────────────────
      - name: 🧬 Run integration tests
        id: integration-tests
        continue-on-error: true
        env:
          # ── Environment Configuration ────────────────────────────────────
          ASPNETCORE_ENVIRONMENT: Testing
          
          # ── Database Connection (127.0.0.1 for Service Containers) ──────
          # localhost resolves to Unix socket — 127.0.0.1 forces TCP/IP
          ConnectionStrings__DefaultConnection: "Server=127.0.0.1;Port=3306;Database=financesap_tests;Uid=root;Pwd=root;AllowPublicKeyRetrieval=true;"
          
          # ── JWT Configuration (Secret Masking via GitHub Secrets) ───────
          # Double underscore (__) maps to nested JSON in appsettings:
          # Jwt__Key → { "Jwt": { "Key": "..." } }
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER || 'FinanceSap' }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE || 'FinanceSap' }}
          
          # ── Logging Configuration ────────────────────────────────────────
          Logging__LogLevel__Default: Warning
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: Warning

        run: |
          dotnet test ${{ env.TEST_PROJECT }} \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~Integration" \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=integration-tests.trx" \
            --logger "html;LogFileName=integration-tests.html" \
            --results-directory ./test-results/integration

      # ── Test Results Analysis (Native GitHub Summary) ─────────────────────────
      - name: 📊 Analyze integration test results
        if: always()
        run: |
          echo "## 🧬 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "./test-results/integration/integration-tests.trx" ]; then
            # Extract test counts from TRX
            TOTAL=$(grep -oP 'total="\K[0-9]+' ./test-results/integration/integration-tests.trx | head -1)
            PASSED=$(grep -oP 'passed="\K[0-9]+' ./test-results/integration/integration-tests.trx | head -1)
            FAILED=$(grep -oP 'failed="\K[0-9]+' ./test-results/integration/integration-tests.trx | head -1)
            
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILED" -gt 0 ]; then
              echo "### ❌ Failed Tests Details" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -B 2 -A 10 'outcome="Failed"' ./test-results/integration/integration-tests.trx | head -200 >> $GITHUB_STEP_SUMMARY || echo "No detailed failure info available"
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No test results file found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Fail the Job if Tests Failed ─────────────────────────────────────────
      - name: ❌ Fail if tests failed
        if: steps.integration-tests.outcome == 'failure'
        run: |
          echo "❌ Integration tests failed. Check the summary above for details."
          exit 1

      # ── Artifact Upload for Post-Mortem Analysis ──────────────────────────
      - name: 📤 Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            ./test-results/integration/**/*
          retention-days: 30  # Extended retention for compliance

      # ── MySQL Logs on Failure (Debugging Aid) ─────────────────────────────
      - name: 📋 Dump MySQL logs on failure
        if: failure()
        run: |
          echo "## 🔍 MySQL Container Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker logs mysql-test-container 2>&1 | tail -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
